<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Sentiment Analyzer</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <h1>YouTube Sentiment Analyzer</h1>
  <p>Paste a YouTube video URL and analyze a random sample of comments.</p>

  <div class="row">
    <input
      id="youtubeUrl"
      type="text"
      placeholder="https://www.youtube.com/watch?v=..."
    />
    <button id="analyzeBtn">Analyze</button>
  </div>

  <div class="row">
    <button class="sample-btn active" data-size="50">Random 50</button>
    <button class="sample-btn" data-size="100">Random 100</button>
    <button class="sample-btn" data-size="200">Random 200</button>
  </div>

  <div id="loading" class="loading hidden">Analyzing comments...</div>
  <div id="error" class="error hidden"></div>

  <div id="results" class="hidden">
    <div class="card">
      <h2>Summary</h2>
      <p><strong>Video ID:</strong> <span id="videoId"></span></p>
      <div class="meta" id="sampleMeta"></div>

      <div class="summary">
        <div class="pill">Positive: <span id="positiveCount">0</span></div>
        <div class="pill">Neutral: <span id="neutralCount">0</span></div>
        <div class="pill">Negative: <span id="negativeCount">0</span></div>
      </div>

      <div class="themes-grid">
        <div class="theme-box">
          <h3>Top Positive Themes</h3>
          <ul id="positiveThemes"></ul>
        </div>

        <div class="theme-box">
          <h3>Top Negative Themes</h3>
          <ul id="negativeThemes"></ul>
        </div>

        <div class="theme-box">
          <h3>Top Neutral Themes</h3>
          <ul id="neutralThemes"></ul>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Comments</h2>
      <div id="commentsList"></div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
